  <style>
    :root {
      --ink: #1e293b;
      --ink-soft: #64748b;
      --line: #e2e8f0;
      --surface: #ffffff;
      --canvas: #f1f5f9;
      --brand: #2563eb;
      --brand-soft: #eff6ff;
      --done: #16a34a;
      --done-soft: #ecfdf3;
      --ongoing: #d97706;
      --ongoing-soft: #fffbeb;
      --user-badge: #7c3aed;
      --user-badge-soft: #f5f3ff;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--canvas);
      color: var(--ink);
      padding: 24px;
    }

    @media (max-width: 768px) {
      body { padding: 12px; }
    }

    /* ---------- Header ---------- */
    .page-header { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
    .page-header .title-block { display: flex; align-items: center; gap: 14px; }
    .page-header .icon-badge {
      height: 68px;
      display: flex; align-items: center;
      flex-shrink: 0;
    }
    .page-header .icon-badge img { height: 100%; width: auto; display: block; }
    .page-header h2 { font-weight: 800; margin: 0; letter-spacing: -0.02em; font-size: 1.5rem; }
    .page-header .subtitle { color: var(--ink-soft); font-size: 0.9rem; margin: 0; }

    @media (max-width: 576px) {
      .page-header h2 { font-size: 1.2rem; }
      .page-header .subtitle { font-size: 0.8rem; }
      .page-header .icon-badge { height: 52px; }
    }

    .auth-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .role-badge { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 999px; font-weight: 700; font-size: 0.82rem; white-space: nowrap; }
    .role-badge.admin { background: var(--done-soft); color: var(--done); }
    .role-badge.user { background: var(--user-badge-soft); color: var(--user-badge); }

    .dropdown-menu { border-radius: 10px; border: 1px solid var(--line); box-shadow: 0 8px 24px rgba(15,23,42,0.08); }

    /* ---------- Tabs ---------- */
    .nav-tabs { border-bottom: 1px solid var(--line); margin-bottom: 20px; gap: 4px; }
    .nav-tabs .nav-link {
      color: var(--ink-soft); font-weight: 600; border: none; border-radius: 8px 8px 0 0;
      padding: 10px 22px; background: transparent;
    }
    .nav-tabs .nav-link.active { color: var(--brand); background: var(--surface); box-shadow: 0 -2px 0 var(--brand) inset; }

    /* ---------- Cards ---------- */
    .card { border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 1px 2px rgba(15,23,42,0.04); margin-bottom: 20px; }
    .card-header { background-color: var(--surface); border-bottom: 1px solid var(--line); border-radius: 14px 14px 0 0 !important; padding: 16px 20px; }

    /* ---------- Collapsible add-form trigger ---------- */
    .add-toggle {
      cursor: pointer; user-select: none;
      display: flex; align-items: center; justify-content: space-between;
    }
    .add-toggle h5 { margin: 0; font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
    .add-toggle .chevron { transition: transform 0.2s ease; color: var(--ink-soft); font-size: 1.1rem; }
    .add-toggle[aria-expanded="true"] .chevron { transform: rotate(180deg); }

    .form-label { font-weight: 600; font-size: 0.85rem; color: var(--ink-soft); margin-bottom: 6px; }
    .form-control, .form-select { border-radius: 8px; border-color: var(--line); padding: 10px 12px; }
    .form-control:focus, .form-select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }

    /* Toggle chips for Collected / Uploaded */
    .toggle-chip-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-check + label.toggle-chip {
      display: flex; align-items: center; gap: 8px; flex: 1; min-width: 140px;
      border: 1.5px solid var(--line); border-radius: 10px; padding: 10px 14px;
      color: var(--ink-soft); font-weight: 600; font-size: 0.88rem; cursor: pointer;
      transition: all 0.15s ease; background: var(--surface);
    }
    .btn-check:checked + label.toggle-chip {
      border-color: var(--brand); background: var(--brand-soft); color: var(--brand);
    }
    .toggle-chip i { font-size: 1.05rem; }

    /* ---------- Search ---------- */
    #btnRefresh i.spin { animation: spin-icon 0.8s linear infinite; }
    @keyframes spin-icon { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .search-box { width: 320px; }
    .search-box .input-group-text { background: var(--surface); border-right: none; }
    .search-box .form-control { border-left: none; }

    @media (max-width: 768px) {
      .search-box { width: 100%; }
      .card-header.d-flex { flex-direction: column; align-items: stretch !important; gap: 10px; }
      .card-header .d-flex.align-items-center.gap-2 { flex-wrap: wrap; }
    }

    /* ---------- Table ---------- */
    .table-shell { max-height: 560px; overflow-y: auto; overflow-x: auto; }
    #dataTable { table-layout: auto; width: 100%; min-width: 760px; margin-bottom: 0; }
    #dataTable th, #dataTable td {
      white-space: normal; word-wrap: break-word; overflow-wrap: break-word;
      vertical-align: middle; padding: 12px 14px; font-size: 0.9rem;
    }
    #dataTable thead th {
      position: sticky; top: 0; z-index: 2;
      background-color: #f8fafc; font-weight: 700; color: var(--ink);
      border-bottom: 2px solid var(--line); font-size: 0.82rem;
      text-transform: uppercase; letter-spacing: 0.03em;
    }
    #dataTable tbody tr:hover { background-color: #f8fafc; }
    #dataTable tbody td { border-bottom: 1px solid var(--line); }

    @media (max-width: 576px) {
      #dataTable th, #dataTable td { padding: 10px 10px; font-size: 0.83rem; }
    }

    /* ---------- Sortable headers ---------- */
    .sortable { cursor: pointer; user-select: none; white-space: nowrap; }
    .sortable:hover { color: var(--brand); }
    .sort-icon { margin-left: 4px; font-size: 0.72rem; opacity: 0.4; vertical-align: 1px; }
    .sortable:hover .sort-icon { opacity: 0.75; }
    .sort-icon.active { opacity: 1; color: var(--brand); }

    /* ---------- Table meta row ---------- */
    .table-meta {
      display: none; align-items: center; justify-content: flex-end;
      padding: 10px 20px; border-bottom: 1px solid var(--line); background: #fafbfc;
      flex-wrap: wrap; gap: 10px;
    }
    .table-meta.active { display: flex; }

    .filtered-count {
      color: var(--ink-soft); font-size: 0.82rem; font-weight: 600; white-space: nowrap;
      background: var(--canvas); padding: 6px 12px; border-radius: 8px;
    }

    .batch-toolbar { display: none; align-items: center; gap: 10px; flex-wrap: wrap; width: 100%; }
    .batch-toolbar.active { display: flex; }
    .batch-toolbar .batch-count {
      background: var(--brand-soft); color: var(--brand); font-weight: 700;
      padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; white-space: nowrap;
    }
    .batch-toolbar select { border-radius: 8px; border-color: var(--line); font-size: 0.85rem; padding: 6px 10px; }

    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 999px; font-weight: 700; font-size: 0.78rem; white-space: nowrap;
    }
    .status-pill.done { background: var(--done-soft); color: var(--done); }
    .status-pill.ongoing { background: var(--ongoing-soft); color: var(--ongoing); }

    .checklist-icons { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .checklist-icons i { font-size: 1.15rem; }

    .btn-edit-row {
      border: 1px solid var(--line); background: var(--surface); color: var(--brand);
      width: 34px; height: 34px; border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .btn-edit-row:hover { background: var(--brand-soft); }

    /* ---------- Edit / generic modal ---------- */
    .modal-content { border-radius: 14px; border: none; }
    .modal-header { border-bottom: 1px solid var(--line); }
    .modal-footer { border-top: 1px solid var(--line); }

    /* ---------- Password field ---------- */
    .password-field { position: relative; }
    .password-field input { padding-right: 42px; }
    .password-toggle-btn {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      border: none; background: transparent; color: var(--ink-soft); width: 32px; height: 32px;
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
    }
    .password-toggle-btn:hover { background: var(--canvas); color: var(--ink); }

    /* ---------- Login gate ---------- */
    #loginGate {
      position: fixed; inset: 0; z-index: 1050;
      background: linear-gradient(160deg, #eef2ff 0%, var(--canvas) 55%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    #loginGate.d-none { display: none !important; }
    .login-card {
      width: 100%; max-width: 400px; background: var(--surface);
      border: 1px solid var(--line); border-radius: 16px; padding: 32px 28px;
      box-shadow: 0 12px 40px rgba(15,23,42,0.10);
    }
    .login-card .icon-badge {
      height: 130px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
    }
    .login-card .icon-badge img { height: 100%; width: auto; display: block; }
    .login-card h4 { font-weight: 800; text-align: center; margin-bottom: 4px; letter-spacing: -0.01em; }
    .login-card .login-subtitle { text-align: center; color: var(--ink-soft); font-size: 0.88rem; margin-bottom: 24px; }
    .login-card .form-check-label { font-size: 0.88rem; color: var(--ink-soft); }
    .login-hint-list { font-size: 0.78rem; color: var(--ink-soft); background: var(--canvas); border-radius: 10px; padding: 10px 14px; margin-top: 18px; }
    .login-hint-list code { color: var(--brand); background: var(--brand-soft); padding: 1px 5px; border-radius: 4px; }

    @media (max-width: 420px) {
      .login-card { padding: 26px 20px; }
    }
  </style>
</head>
